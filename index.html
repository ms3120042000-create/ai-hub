  <style>
    :root {
      --bg:       #0d0d12;
      --bg2:      #13131a;
      --bg3:      #1a1a24;
      --surface:  #20202e;
      --surface2: #282838;
      --border:   rgba(255,255,255,0.07);
      --border2:  rgba(255,255,255,0.12);
      --text:     #e4e4f0;
      --text2:    #8888a8;
      --text3:    #5555778;
      --accent:   #7c6fff;
      --accent2:  #ff6b9d;
      --glow:     rgba(124,111,255,0.25);
      --r:        14px;
      --sidebar:  230px;
      --topbar:   60px;
      --navh:     52px;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter','Noto Sans KR',sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── TOP BAR ── */
    .topbar {
      position: fixed; top:0; left:0; right:0;
      height: var(--topbar);
      background: rgba(13,13,18,0.92);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap:20px;
      padding: 0 24px;
      z-index: 200;
    }
    .logo {
      font-size: 18px; font-weight: 700; letter-spacing: -0.5px; white-space: nowrap;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .search-box {
      flex: 1; max-width: 380px; position: relative;
    }
    .search-box input {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 24px; padding: 8px 16px 8px 38px;
      color: var(--text); font-size: 13.5px; font-family: inherit;
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    .search-box input::placeholder { color: var(--text2); }
    .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }
    .search-box .ico {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      color: var(--text2); font-size: 13px; pointer-events: none;
    }
    .total-badge {
      margin-left: auto; white-space: nowrap;
      background: var(--surface); border: 1px solid var(--border);
      padding: 4px 13px; border-radius: 20px; font-size: 12px; color: var(--text2);
    }
    .total-badge span { color: var(--accent); font-weight: 600; }
    .visitor-badge { display: flex; align-items: center; text-decoration: none; flex-shrink: 0; }
    .visitor-badge img { height: 22px; border-radius: 4px; }

    /* ── CATEGORY NAV ── */
    .cat-nav {
      position: fixed; top: var(--topbar); left:0; right:0;
      height: var(--navh);
      background: rgba(19,19,26,0.92);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 4px;
      padding: 0 20px; overflow-x: auto;
      z-index: 199;
    }
    .cat-nav::-webkit-scrollbar { display: none; }
    .cat-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 16px; border-radius: 24px;
      border: 1px solid transparent; background: none;
      color: var(--text2); font-size: 13.5px; font-weight: 500;
      cursor: pointer; white-space: nowrap; font-family: inherit;
      transition: all .18s;
    }
    .cat-btn:hover { background: var(--surface); color: var(--text); border-color: var(--border2); }
    .cat-btn.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; font-weight: 600; border-color: transparent;
      box-shadow: 0 4px 20px rgba(124,111,255,0.35);
    }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      padding-top: calc(var(--topbar) + var(--navh));
      min-height: 100vh;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar); flex-shrink: 0;
      position: fixed;
      top: calc(var(--topbar) + var(--navh)); bottom: 0; left: 0;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      overflow-y: auto; padding: 18px 10px;
    }
    .sidebar::-webkit-scrollbar { width: 3px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }
    .sidebar-label {
      font-size: 9.5px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--text2);
      padding: 2px 10px 10px; margin-top: 4px;
    }
    .sub-btn {
      display: flex; align-items: center; gap: 8px; width: 100%;
      padding: 9px 12px; border-radius: 10px;
      border: none; background: none;
      color: var(--text2); font-size: 13px; font-weight: 400;
      cursor: pointer; text-align: left; font-family: inherit;
      transition: all .15s; margin-bottom: 2px;
    }
    .sub-btn:hover { background: var(--bg3); color: var(--text); }
    .sub-btn.active { background: rgba(124,111,255,0.13); color: #a097ff; font-weight: 600; }
    .sub-btn .cnt {
      margin-left: auto; font-size: 11px; font-weight: 500;
      background: var(--surface2); color: var(--text2);
      padding: 1px 8px; border-radius: 10px; min-width: 24px; text-align: center;
    }
    .sub-btn.active .cnt { background: rgba(124,111,255,0.2); color: var(--accent); }

    /* ── MAIN ── */
    .main { flex: 1; margin-left: var(--sidebar); padding: 28px 24px 48px; }

    .sec-header { margin-bottom: 22px; }
    .sec-header h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 5px; }
    .sec-header p  { color: var(--text2); font-size: 13px; }

    .sub-section { margin-bottom: 30px; }
    .sub-title {
      font-size: 12px; font-weight: 700; color: var(--text2);
      letter-spacing: 0.8px; text-transform: uppercase;
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px;
    }
    .sub-title::after { content:''; flex:1; height:1px; background: var(--border); }

    /* ── CARDS ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(252px, 1fr));
      gap: 14px;
    }
    .card {
      display: block; text-decoration: none; color: inherit;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      border-top: 3px solid var(--cc, var(--accent));
      padding: 18px 18px 14px;
      transition: transform .22s, box-shadow .22s, border-color .22s;
      position: relative; overflow: hidden;
    }
    .card::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 30% 0%, var(--cc, var(--accent)) 0%, transparent 60%);
      opacity: 0; transition: opacity .22s; pointer-events: none;
    }
    .card:hover {
      transform: translateY(-5px);
      border-color: var(--border2);
      box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
    }
    .card:hover::after { opacity: 0.055; }

    .card-head { display: flex; align-items: center; gap: 13px; margin-bottom: 12px; }
    .card-logo {
      width: 46px; height: 46px; border-radius: 12px; flex-shrink: 0;
      background: var(--surface2); display: flex; align-items: center; justify-content: center;
      font-size: 22px; overflow: hidden;
      border: 1px solid var(--border);
    }
    .card-logo img { width: 28px; height: 28px; object-fit: contain; }
    .card-meta { flex: 1; min-width: 0; }
    .card-name {
      font-size: 14.5px; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .badge-row { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .tag {
      display: inline-block; font-size: 10.5px; font-weight: 500;
      padding: 2px 8px; border-radius: 6px;
      background: var(--surface2); color: var(--text2);
    }
    .new-badge {
      font-size: 9.5px; font-weight: 700; letter-spacing: 0.5px;
      padding: 2px 6px; border-radius: 5px; text-transform: uppercase;
    }
    .new-badge.hot { background: rgba(255,107,107,0.2); color: #ff6b6b; }
    .new-badge.new { background: rgba(124,111,255,0.2); color: #a097ff; }

    .card-desc { font-size: 12.5px; color: var(--text2); line-height: 1.65; margin-bottom: 14px; }

    .card-foot {
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid var(--border); padding-top: 11px;
    }
    .card-domain { font-size: 11px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex:1; }
    .go-btn {
      flex-shrink: 0; margin-left: 10px;
      background: var(--surface2); border: 1px solid var(--border2);
      color: var(--text2); padding: 5px 13px; border-radius: 8px;
      font-size: 11.5px; font-weight: 600;
      transition: background .18s, color .18s, border-color .18s;
    }
    .card:hover .go-btn {
      background: var(--accent); border-color: var(--accent);
      color: #fff; box-shadow: 0 4px 14px rgba(124,111,255,0.4);
    }

    /* ── NO RESULTS ── */
    .empty { text-align: center; padding: 80px 20px; color: var(--text2); }
    .empty .ei { font-size: 52px; margin-bottom: 16px; }
    .empty h3 { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: var(--text); }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .sidebar { display: none; }
      .main { margin-left: 0; padding: 20px 14px 40px; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); }
    }
    @media (max-width: 600px) {
      .logo { font-size: 15px; }
      .total-badge { display: none; }
      .grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .card { padding: 14px 14px 10px; }
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text2); }
  </style>
</head>

const CAT_ICONS = {
  "자주 쓰는 AI":"⭐", "AI 어시스턴트":"🤖", "AI 이미지":"🎨", "AI 음악/영상":"🎵", "AI 코딩":"💻", "AI 리소스":"📚",
  "생산성 AI":"📝", "자동화":"⚙️", "음성 생성":"🎙️"
};
const CATS = [...new Set(S.map(s=>s.c))];

let activeCat = CATS[0];
let activeSub = "전체";

// ── helpers ──────────────────────────────────────────────────────────────────
const getSubs = cat => ["전체", ...new Set(S.filter(s=>s.c===cat).map(s=>s.s))];
const getFav  = url => { try { return `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=64`; } catch{return "";} };
const getDom  = url => { try { return new URL(url).hostname.replace("www.",""); } catch{return url;} };
const q = () => document.getElementById("q").value.toLowerCase();

function filtered() {
  const qv = q();
  if (qv) return S.filter(s => s.n.toLowerCase().includes(qv) || s.d.toLowerCase().includes(qv) || s.s.toLowerCase().includes(qv) || s.c.toLowerCase().includes(qv));
  return S.filter(s => s.c === activeCat && (activeSub === "전체" || s.s === activeSub));
}

// ── render ────────────────────────────────────────────────────────────────────
function renderNav() {
  document.getElementById("catNav").innerHTML = CATS.map(cat =>
    `<button class="cat-btn${cat===activeCat?" active":""}" onclick="selCat('${cat}')">${CAT_ICONS[cat]||"📌"} ${cat}</button>`
  ).join("");
}

function renderSidebar() {
  const subs = getSubs(activeCat);
  document.getElementById("sidebar").innerHTML =
    `<div class="sidebar-label">카테고리</div>` +
    subs.map(s => {
      const cnt = s==="전체" ? S.filter(x=>x.c===activeCat).length : S.filter(x=>x.c===activeCat&&x.s===s).length;
      return `<button class="sub-btn${s===activeSub?" active":""}" onclick="selSub('${s}')">${s}<span class="cnt">${cnt}</span></button>`;
    }).join("");
}

function renderCard(s) {
  const badgeHtml = s.badge
    ? `<span class="new-badge ${s.badge}">${s.badge==="hot"?"🔥 HOT":"✨ NEW"}</span>`
    : "";
  return `<a class="card" href="${s.u}" target="_blank" rel="noopener noreferrer" style="--cc:${s.color}">
    <div class="card-head">
      <div class="card-logo" style="border-color:${s.color}33">
        <img src="${getFav(s.u)}" alt="${s.n}" onerror="this.parentNode.innerHTML='<span style=font-size:22px>🔗</span>'">
      </div>
      <div class="card-meta">
        <div class="card-name">${s.n}</div>
        <div class="badge-row"><span class="tag">${s.s}</span>${badgeHtml}</div>
      </div>
    </div>
    <div class="card-desc">${s.d}</div>
    <div class="card-foot">
      <span class="card-domain">${getDom(s.u)}</span>
      <span class="go-btn">방문하기 →</span>
    </div>
  </a>`;
}

function renderMain() {
  const list = filtered();
  const main = document.getElementById("main");
  const cnt  = document.getElementById("cnt");
  cnt.textContent = list.length;

  if (!list.length) {
    main.innerHTML = `<div class="empty"><div class="ei">🔍</div><h3>검색 결과 없음</h3><p>다른 키워드로 검색해 보세요</p></div>`;
    return;
  }

  const qv = q();

  if (qv) {
    main.innerHTML = `
      <div class="sec-header"><h2>🔍 "${document.getElementById("q").value}" 검색 결과</h2><p>${list.length}개 서비스</p></div>
      <div class="grid">${list.map(renderCard).join("")}</div>`;
    return;
  }

  if (activeSub !== "전체") {
    main.innerHTML = `
      <div class="sec-header"><h2>${CAT_ICONS[activeCat]} ${activeCat}</h2><p>${activeSub} · ${list.length}개 서비스</p></div>
      <div class="grid">${list.map(renderCard).join("")}</div>`;
    return;
  }

  const subs = [...new Set(list.map(s=>s.s))];
  main.innerHTML = `
    <div class="sec-header"><h2>${CAT_ICONS[activeCat]} ${activeCat}</h2><p>${subs.length}개 분류 · ${list.length}개 서비스</p></div>` +
    subs.map(sub => {
      const items = list.filter(s=>s.s===sub);
      return `<div class="sub-section"><div class="sub-title">${sub}</div><div class="grid">${items.map(renderCard).join("")}</div></div>`;
    }).join("");
}

function render() { renderNav(); renderSidebar(); renderMain(); }

function selCat(cat) { activeCat=cat; activeSub="전체"; render(); }
function selSub(sub) { activeSub=sub; renderSidebar(); renderMain(); }

document.getElementById("q").addEventListener("input", renderMain);

render();
</script>
</body>
